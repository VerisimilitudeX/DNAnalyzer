name: Architecture sync

on:
  push:
    branches: [main]
    paths:
      - 'src/main/java/**'
      - 'scripts/generate-module-graph.py'
      - 'docs/ARCHITECTURE.md'
  pull_request:
    branches: [main]
    paths:
      - 'src/main/java/**'
      - 'scripts/generate-module-graph.py'

permissions:
  contents: write

jobs:
  sync:
    name: Regenerate module graph
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          # Full history is not needed, but we need write access for the push on main.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate graph
        run: python3 scripts/generate-module-graph.py

      - name: Check for changes (PR)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet -- docs/ARCHITECTURE.md; then
            echo "::error::docs/ARCHITECTURE.md is out of sync with the source tree."
            echo "Run 'python3 scripts/generate-module-graph.py' locally and commit the result."
            git diff -- docs/ARCHITECTURE.md
            exit 1
          fi

      - name: Commit refreshed graph (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- docs/ARCHITECTURE.md; then
            echo "module graph already up to date"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/ARCHITECTURE.md
          git commit -m "docs: refresh auto-generated module graph"
          git push
