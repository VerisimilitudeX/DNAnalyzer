services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dnanalyzer:latest
    container_name: dnanalyzer-api
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: dnanalyzer-web
    ports:
      - "3000:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
